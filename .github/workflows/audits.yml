name: Lighthouse

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@master

      - name: Set up Node.js
        uses: actions/setup-node@master
        with:
          node-version: 24.x

      - name: Install audit dependencies
        run: npm ci --workspace @christophervoigt/blog-audits --include-workspace-root=false

      - name: Install Chrome
        run: npm exec --workspace @christophervoigt/blog-audits -- puppeteer browsers install chrome

      - name: Run audits against live site
        env:
          AUDIT_BASE_URL: https://christophervoigt.dev
        run: npm run test:full --workspace @christophervoigt/blog-audits
